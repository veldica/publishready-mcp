name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (Select "All" for first release or full sync)'
        required: true
        type: choice
        options:
          - 'All (schemas -> core -> mcp -> cli)'
          - '@veldica/publishready-schemas'
          - '@veldica/publishready-core'
          - '@veldica/publishready-mcp'
          - '@veldica/publishready-cli'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm pack --workspace=@veldica/publishready-mcp --dry-run

      - name: Publish All to NPM
        if: github.event_name == 'push' || github.event.inputs.package == 'All (schemas -> core -> mcp -> cli)'
        continue-on-error: true
        run: |
          publish_if_missing() {
            package="$1"
            version="$(npm pkg get version --workspace="$package" --json | node -e 'const input = JSON.parse(require("fs").readFileSync(0, "utf8")); console.log(typeof input === "string" ? input : Object.values(input)[0]);')"
            if npm view "$package@$version" version >/dev/null 2>&1; then
              echo "$package@$version already exists on npm; skipping"
            else
              npm publish --workspace="$package" --provenance --access public
            fi
          }
          publish_if_missing @veldica/publishready-schemas
          publish_if_missing @veldica/publishready-core
          publish_if_missing @veldica/publishready-mcp
          publish_if_missing @veldica/publishready-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish Single to NPM
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.package != 'All (schemas -> core -> mcp -> cli)'
        continue-on-error: true
        run: |
          package="${{ github.event.inputs.package }}"
          version="$(npm pkg get version --workspace="$package" --json | node -e 'const input = JSON.parse(require("fs").readFileSync(0, "utf8")); console.log(typeof input === "string" ? input : Object.values(input)[0]);')"
          if npm view "$package@$version" version >/dev/null 2>&1; then
            echo "$package@$version already exists on npm; skipping"
          else
            npm publish --workspace="$package" --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://npm.pkg.github.com'
          scope: '@veldica'

      - name: Publish All to GitHub Packages
        if: github.event_name == 'push' || github.event.inputs.package == 'All (schemas -> core -> mcp -> cli)'
        run: |
          publish_if_missing() {
            package="$1"
            version="$(npm pkg get version --workspace="$package" --json | node -e 'const input = JSON.parse(require("fs").readFileSync(0, "utf8")); console.log(typeof input === "string" ? input : Object.values(input)[0]);')"
            if npm view "$package@$version" version >/dev/null 2>&1; then
              echo "$package@$version already exists on GitHub Packages; skipping"
            else
              npm publish --workspace="$package" --access public
            fi
          }
          publish_if_missing @veldica/publishready-schemas
          publish_if_missing @veldica/publishready-core
          publish_if_missing @veldica/publishready-mcp
          publish_if_missing @veldica/publishready-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Single to GitHub Packages
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.package != 'All (schemas -> core -> mcp -> cli)'
        run: |
          package="${{ github.event.inputs.package }}"
          version="$(npm pkg get version --workspace="$package" --json | node -e 'const input = JSON.parse(require("fs").readFileSync(0, "utf8")); console.log(typeof input === "string" ? input : Object.values(input)[0]);')"
          if npm view "$package@$version" version >/dev/null 2>&1; then
            echo "$package@$version already exists on GitHub Packages; skipping"
          else
            npm publish --workspace="$package" --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
