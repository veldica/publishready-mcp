name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (Select "All" for first release or full sync)'
        required: true
        type: choice
        options:
          - 'All (schemas -> core -> mcp -> cli)'
          - '@veldica/publishready-schemas'
          - '@veldica/publishready-core'
          - '@veldica/publishready-mcp'
          - '@veldica/publishready-cli'

env:
  SELECTED_PACKAGE: ${{ github.event_name == 'push' && 'All (schemas -> core -> mcp -> cli)' || github.event.inputs.package }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm pack --workspace=@veldica/publishready-mcp --dry-run

  publish-npm:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - name: Publish to NPM
        run: |
          publish_if_missing() {
            package="$1"
            version="$(npm pkg get version --workspace="$package" --json | node -e 'const input = JSON.parse(require("fs").readFileSync(0, "utf8")); console.log(typeof input === "string" ? input : Object.values(input)[0]);')"
            if npm view "$package@$version" version >/dev/null 2>&1; then
              echo "$package@$version already exists on npm; skipping"
            else
              npm publish --workspace="$package" --provenance --access public
            fi
          }

          if [ "$SELECTED_PACKAGE" = "All (schemas -> core -> mcp -> cli)" ]; then
            publish_if_missing @veldica/publishready-schemas
            publish_if_missing @veldica/publishready-core
            publish_if_missing @veldica/publishready-mcp
            publish_if_missing @veldica/publishready-cli
          else
            publish_if_missing "$SELECTED_PACKAGE"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-github-packages:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://npm.pkg.github.com'
          scope: '@veldica'
      - run: npm ci
      - name: Publish to GitHub Packages
        run: |
          publish_if_missing() {
            package="$1"
            version="$(npm pkg get version --workspace="$package" --json | node -e 'const input = JSON.parse(require("fs").readFileSync(0, "utf8")); console.log(typeof input === "string" ? input : Object.values(input)[0]);')"
            if npm view "$package@$version" version >/dev/null 2>&1; then
              echo "$package@$version already exists on GitHub Packages; skipping"
            else
              npm publish --workspace="$package" --access public
            fi
          }

          if [ "$SELECTED_PACKAGE" = "All (schemas -> core -> mcp -> cli)" ]; then
            publish_if_missing @veldica/publishready-schemas
            publish_if_missing @veldica/publishready-core
            publish_if_missing @veldica/publishready-mcp
            publish_if_missing @veldica/publishready-cli
          else
            publish_if_missing "$SELECTED_PACKAGE"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-registry:
    runs-on: ubuntu-latest
    needs: publish-npm
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          chmod +x mcp-publisher
      - name: Publish to MCP Registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
